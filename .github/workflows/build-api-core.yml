name: Build API Core

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api-core/**'
      - 'docker/Dockerfile.api-core'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.github/workflows/build-api-core.yml'
      - '.github/workflows/_build-and-push.yml'
      - '.github/workflows/_update-image-tags.yml'
      - '.github/actions/setup-monorepo/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apps/api-core/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.github/workflows/build-api-core.yml'
      - '.github/workflows/_build-and-push.yml'
      - '.github/workflows/_update-image-tags.yml'
      - '.github/actions/setup-monorepo/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Lint
        working-directory: ./apps/api-core
        run: pnpm lint

      - name: Type-check
        working-directory: ./apps/api-core
        run: pnpm type-check

      - name: Test
        working-directory: ./apps/api-core
        run: pnpm test

      - name: Build
        working-directory: ./apps/api-core
        run: pnpm build

  build-and-push:
    if: github.event_name == 'push'
    uses: ./.github/workflows/_build-and-push.yml
    with:
      app_name: api-core
      dockerfile: docker/Dockerfile.api-core
      ecr_repository: everbloom/api-core
      kustomization_path: deploy/apps/api-core/base/kustomization.yaml
    secrets: inherit
    permissions:
      contents: write
      id-token: write
