name: Deploy Dev to Railway

on:
  push:
    branches:
      - develop
    paths:
      - 'apps/api-core/**'
      - 'apps/web-admin/**'
      - 'docker/Dockerfile.api-core'
      - 'docker/Dockerfile.web-admin'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'apps/api-core/railway.json'
      - 'apps/web-admin/railway.json'
      - '.github/workflows/deploy-dev-railway.yml'
  workflow_dispatch:

concurrency:
  group: deploy-dev-railway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-api-core:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Lint
        working-directory: ./apps/api-core
        run: pnpm lint

      - name: Type-check
        working-directory: ./apps/api-core
        run: pnpm type-check

      - name: Test
        working-directory: ./apps/api-core
        run: pnpm test

      - name: Build
        working-directory: ./apps/api-core
        run: pnpm build

  test-web-admin:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Lint
        working-directory: ./apps/web-admin
        run: pnpm lint

      - name: Type-check
        working-directory: ./apps/web-admin
        run: pnpm type-check

      - name: Test
        working-directory: ./apps/web-admin
        run: pnpm test

      - name: Build
        working-directory: ./apps/web-admin
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:8080/api/v1' }}
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL || 'ws://localhost:8080' }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'Everbloom Admin' }}
          VITE_APP_VERSION: ${{ vars.VITE_APP_VERSION || '0.0.0' }}

  deploy-api-core:
    needs: test-api-core
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy api-core to Railway
        run: railway up --service api-core-dev --environment development
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

  deploy-web-admin:
    needs: test-web-admin
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy web-admin to Railway
        run: railway up --service web-admin-dev --environment development
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
