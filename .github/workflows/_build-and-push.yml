name: Build and Push to ECR

on:
  workflow_call:
    inputs:
      app_name:
        description: Application name
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile
        required: true
        type: string
      ecr_repository:
        description: ECR repository name
        required: true
        type: string
      kustomization_path:
        description: Path to the base kustomization.yaml to update
        required: true
        type: string
      build_context:
        description: Docker build context
        required: false
        type: string
        default: '.'
      build_args:
        description: Docker build arguments (newline-separated KEY=value)
        required: false
        type: string
        default: ''

env:
  AWS_REGION: ap-south-2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-ecr-push

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr_repository }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  update-gitops:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_update-image-tags.yml
    with:
      image_tag: ${{ github.sha }}
      kustomization_paths: ${{ inputs.kustomization_path }}
      update_gitops: true
    permissions:
      contents: write
