name: Toggle Dev Environment

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Start or stop the development environment'
        required: true
        type: choice
        options:
          - start
          - stop

env:
  AWS_REGION: ap-south-2
  EKS_CLUSTER_NAME: everbloom-production
  NAMESPACE: development

jobs:
  toggle:
    name: ${{ github.event.inputs.action == 'start' && 'Start' || 'Stop' }} dev environment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-dev-env

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Set target replicas
        id: replicas
        run: |
          if [ "${{ github.event.inputs.action }}" = "start" ]; then
            echo "count=1" >> "$GITHUB_OUTPUT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Scale dev deployments
        run: |
          kubectl scale -n ${{ env.NAMESPACE }} \
            deployment/api-core \
            deployment/web-admin \
            deployment/web-public \
            --replicas=${{ steps.replicas.outputs.count }}

      - name: Scale dev MongoDB
        run: |
          kubectl scale -n ${{ env.NAMESPACE }} statefulset/mongodb \
            --replicas=${{ steps.replicas.outputs.count }}
