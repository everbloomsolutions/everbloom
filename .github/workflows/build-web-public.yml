name: Build Web Public

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/web-public/**'
      - 'docker/Dockerfile.web-public'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.github/workflows/build-web-public.yml'
      - '.github/workflows/_build-and-push.yml'
      - '.github/workflows/_update-image-tags.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apps/web-public/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.github/workflows/build-web-public.yml'
      - '.github/workflows/_build-and-push.yml'
      - '.github/workflows/_update-image-tags.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-ready:
    runs-on: ubuntu-latest
    outputs:
      is_ready: ${{ steps.check.outputs.is_ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if web-public is implemented
        id: check
        run: |
          if grep -q "not yet implemented" docker/Dockerfile.web-public; then
            echo "is_ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_ready=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: check-ready
    if: github.event_name == 'push' && needs.check-ready.outputs.is_ready == 'true'
    uses: ./.github/workflows/_build-and-push.yml
    with:
      app_name: web-public
      dockerfile: docker/Dockerfile.web-public
      ecr_repository: everbloom/web-public
      kustomization_path: deploy/apps/web-public/base/kustomization.yaml
    secrets: inherit
    permissions:
      contents: write
      id-token: write
