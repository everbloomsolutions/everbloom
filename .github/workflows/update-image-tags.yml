name: Update Image Tags

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to set in deploy base kustomization (default: git SHA)'
        required: false
        default: ''
      update_gitops:
        description: 'Commit and push tag changes to deploy base kustomizations'
        required: false
        default: false
        type: boolean

jobs:
  update-tags:
    uses: ./.github/workflows/_update-image-tags.yml
    with:
      image_tag: ${{ github.event.inputs.image_tag || github.sha }}
      kustomization_paths: deploy/apps/api-core/base/kustomization.yaml,deploy/apps/web-admin/base/kustomization.yaml
      update_gitops: ${{ fromJSON(github.event.inputs.update_gitops || 'false') }}
    permissions:
      contents: write
