name: Build Web Admin

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/web-admin/**'
      - 'docker/Dockerfile.web-admin'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.github/workflows/build-web-admin.yml'
      - '.github/workflows/_build-and-push.yml'
      - '.github/workflows/_update-image-tags.yml'
      - '.github/actions/setup-monorepo/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apps/web-admin/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.github/workflows/build-web-admin.yml'
      - '.github/workflows/_build-and-push.yml'
      - '.github/workflows/_update-image-tags.yml'
      - '.github/actions/setup-monorepo/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Lint
        working-directory: ./apps/web-admin
        run: pnpm lint

      - name: Type-check
        working-directory: ./apps/web-admin
        run: pnpm type-check

      - name: Test
        working-directory: ./apps/web-admin
        run: pnpm test

      - name: Build
        working-directory: ./apps/web-admin
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:8080/api/v1' }}
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL || 'ws://localhost:8080' }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'Everbloom Admin' }}
          VITE_APP_VERSION: ${{ vars.VITE_APP_VERSION || '0.0.0' }}

  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_build-and-push.yml
    with:
      app_name: web-admin
      dockerfile: docker/Dockerfile.web-admin
      ecr_repository: everbloom/web-admin
      kustomization_path: deploy/apps/web-admin/base/kustomization.yaml
      build_args: |
        VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'http://localhost:8080/api/v1' }}
        VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL || 'ws://localhost:8080' }}
        VITE_APP_NAME=${{ vars.VITE_APP_NAME || 'Everbloom Admin' }}
        VITE_APP_VERSION=${{ vars.VITE_APP_VERSION || '0.0.0' }}
    secrets: inherit
    permissions:
      contents: write
      id-token: write
