name: Build Web Admin

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/web-admin/**'
      - 'packages/**'
      - 'docker/Dockerfile.web-admin'
      - '.github/workflows/build-web-admin.yml'
      - '.github/workflows/_build-and-push.yml'
      - '.github/actions/setup-monorepo/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apps/web-admin/**'
      - 'packages/**'
      - '.github/workflows/build-web-admin.yml'
      - '.github/actions/setup-monorepo/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Lint
        working-directory: ./apps/web-admin
        run: pnpm lint

      - name: Type-check
        working-directory: ./apps/web-admin
        run: pnpm type-check

      - name: Test
        working-directory: ./apps/web-admin
        run: pnpm test

  build-and-push:
    if: github.event_name == 'push'
    uses: ./.github/workflows/_build-and-push.yml
    with:
      app_name: web-admin
      dockerfile: docker/Dockerfile.web-admin
      ecr_repository: everbloom/web-admin
      kustomization_path: deploy/apps/web-admin/base/kustomization.yaml
    secrets: inherit
    permissions:
      contents: write
      id-token: write
