apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: gp3-snapshots
  labels:
    app: mongodb
    component: database
driver: ebs.csi.aws.com
deletionPolicy: Retain
parameters:
  # Optional AWS-specific tags to identify backup snapshots
  tagSpecification_1: "Name={{ .VolumeSnapshot.Name }}"
  tagSpecification_2: "Environment=production"
