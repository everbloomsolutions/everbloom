apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-snapshot
  labels:
    app: mongodb
    component: database
spec:
  # 03:00 UTC daily; align outside the ElastiCache snapshot window if possible
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: mongodb
            component: database
        spec:
          serviceAccountName: mongodb-snapshot
          restartPolicy: OnFailure
          containers:
          - name: snapshot
            image: bitnami/kubectl:latest
            command:
            - sh
            - -c
            - |
              set -e
              SNAPSHOT_NAME="mongodb-$(date +%Y%m%d-%H%M%S)"
              cat <<EOF | kubectl apply -f -
              apiVersion: snapshot.storage.k8s.io/v1
              kind: VolumeSnapshot
              metadata:
                name: ${SNAPSHOT_NAME}
              spec:
                volumeSnapshotClassName: gp3-snapshots
                source:
                  persistentVolumeClaimName: mongodb-data-mongodb-0
              EOF
              echo "Created VolumeSnapshot ${SNAPSHOT_NAME}"
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                - ALL
              runAsNonRoot: true
              runAsUser: 1001
              runAsGroup: 1001
              seccompProfile:
                type: RuntimeDefault
