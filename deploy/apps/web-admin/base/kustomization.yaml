apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - configmap.yaml

commonLabels:
  app: web-admin
  component: frontend

images:
  - name: web-admin
    newName: ghcr.io/everbloom/web-admin
    newTag: latest
