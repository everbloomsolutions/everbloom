apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - configmap.yaml
  - external-secret.yaml

commonLabels:
  app: api-core
  component: api

images:
  - name: api-core
    newName: <account-id>.dkr.ecr.ap-south-2.amazonaws.com/everbloom/api-core
    newTag: latest
