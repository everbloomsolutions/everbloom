apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-core
  labels:
    app: api-core
    component: api
spec:
  selector:
    matchLabels:
      app: api-core
  template:
    metadata:
      labels:
        app: api-core
        component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api-core
        image: api-core:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsGroup: 1001
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: api-core-config
              key: NODE_ENV
        - name: PORT
          value: "8080"
        - name: DB_STARTUP_TIMEOUT_MS
          value: "15000"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: api-core-secrets
              key: mongodb-uri
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: api-core-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: api-core-secrets
              key: jwt-secret
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: api-core-secrets
              key: jwt-refresh-secret
        - name: ADMIN_PANEL_URL
          valueFrom:
            configMapKeyRef:
              name: api-core-config
              key: admin-panel-url
        - name: BACKEND_CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: api-core-config
              key: cors-origin
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 18
        lifecycle:
          preStop:
            exec:
              command: ['sh', '-c', 'sleep 10']
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      terminationGracePeriodSeconds: 60
      volumes:
      - name: tmp
        emptyDir: {}
