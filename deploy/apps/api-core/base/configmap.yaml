apiVersion: v1
kind: ConfigMap
metadata:
  name: api-core-config
  labels:
    app: api-core
data:
  NODE_ENV: production
  LOG_LEVEL: info
  admin-panel-url: https://web-admin.vercel.app
  cors-origin: https://web-admin.vercel.app
  # MongoDB Self-hosted Configuration
  MONGODB_HOST: mongodb
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: everbloom
  # ElastiCache Valkey Configuration
  REDIS_HOST: master.everbloom-valkey.q6yhht.aps2.cache.amazonaws.com
  REDIS_PORT: "6379"
