apiVersion: v1
kind: Secret
metadata:
  name: api-core-secrets
  labels:
    app: api-core
type: Opaque
stringData:
  # These values should be encrypted using SOPS
  # See secrets/README.md for encryption instructions
  mongodb-uri: "CHANGE_ME"
  redis-url: "CHANGE_ME"
  jwt-secret: "CHANGE_ME"
  jwt-refresh-secret: "CHANGE_ME"
  cloudinary-cloud-name: "CHANGE_ME"
  cloudinary-api-key: "CHANGE_ME"
  cloudinary-api-secret: "CHANGE_ME"
  google-maps-api-key: "CHANGE_ME"
