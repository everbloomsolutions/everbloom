apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-core
  labels:
    app: api-core
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.everbloom.com
    secretName: api-core-tls
  rules:
  - host: api.everbloom.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-core
            port:
              number: 80
