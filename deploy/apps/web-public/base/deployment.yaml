apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-public
  labels:
    app: web-public
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-public
  template:
    metadata:
      labels:
        app: web-public
        component: frontend
    spec:
      containers:
      - name: web-public
        image: web-public:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
