apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-public
  labels:
    app: web-public
    component: frontend
spec:
  selector:
    matchLabels:
      app: web-public
  template:
    metadata:
      labels:
        app: web-public
        component: frontend
    spec:
      containers:
      - name: web-public
        image: web-public:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: '8080'
        - name: VITE_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: web-public-config
              key: vite-api-base-url
        - name: VITE_SOCKET_URL
          valueFrom:
            configMapKeyRef:
              name: web-public-config
              key: vite-socket-url
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
