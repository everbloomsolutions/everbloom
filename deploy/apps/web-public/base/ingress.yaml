apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-public
  labels:
    app: web-public
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - www.everbloom.com
    secretName: web-public-tls
  rules:
  - host: www.everbloom.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-public
            port:
              number: 80
