apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-public
  labels:
    app: web-public
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-public
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
