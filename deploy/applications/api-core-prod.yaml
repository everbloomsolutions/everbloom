apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-core-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/everbloomsolutions/everbloom.git
    targetRevision: main
    path: deploy/environments/production/api-core
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
