apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: web-public-secrets
  labels:
    app: web-public
spec:
  data:
  - secretKey: api-base-url
    remoteRef:
      key: everbloom/development/web-public
      property: api-base-url
  - secretKey: socket-url
    remoteRef:
      key: everbloom/development/web-public
      property: socket-url
