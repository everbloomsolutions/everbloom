apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-core-secrets
  labels:
    app: api-core
spec:
  data:
  - secretKey: mongodb-uri
    remoteRef:
      key: everbloom/development/api-core
      property: mongodb-uri
  - secretKey: redis-url
    remoteRef:
      key: everbloom/development/api-core
      property: redis-url
  - secretKey: jwt-secret
    remoteRef:
      key: everbloom/development/api-core
      property: jwt-secret
  - secretKey: jwt-refresh-secret
    remoteRef:
      key: everbloom/development/api-core
      property: jwt-refresh-secret
  - secretKey: cloudinary-cloud-name
    remoteRef:
      key: everbloom/development/api-core
      property: cloudinary-cloud-name
  - secretKey: cloudinary-api-key
    remoteRef:
      key: everbloom/development/api-core
      property: cloudinary-api-key
  - secretKey: cloudinary-api-secret
    remoteRef:
      key: everbloom/development/api-core
      property: cloudinary-api-secret
  - secretKey: google-maps-api-key
    remoteRef:
      key: everbloom/development/api-core
      property: google-maps-api-key
